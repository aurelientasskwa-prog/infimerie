<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plateforme de soins</title>
  <style>
    .header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 16px 24px;
    }
    .left { justify-self: start; }
    .center { justify-self: center; }
    .right { justify-self: end; }

    .content {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 24px;
    }

    .welcome {
      color: #539EFF;
      font-size: 55px;
      font-weight: 650;
      line-height: 1.8;
      text-align: center;
      opacity: 0;                /* invisible au départ */
      transform: translateY(30px); /* décalé vers le bas */
      animation: fadeInUp 2s ease forwards; /* animation fluide */
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 40%;
      min-height: 55px;
      padding: 19px 18px;
      border-radius: 80px;
      border: none;
      font-size: 30px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .btn-primary {
      background-color: #539EFF;
      color: #FFFFFF;
      box-shadow: 0px 4px 6px rgba(50, 50, 50, 0.6); /* drop shadow sombre par défaut */
    }

    .btn-secondary {
      background-color: #FFFFFF;
      color: #539EFF;
      border: 2px solid #539EFF;
    }

    .btn:hover {
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
    }

    .icon {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    .i {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }
    .d {
      background-color: #539EFF;
      color: #FFFFFF;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
      padding: 15px 25px;
      font-weight: 650;
    }
    .d:hover {
      background-color: rgba(218, 24, 24, 0.35);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="left">
      <img class="icon" src="img1.png">
    </div>
    <div class="center">
      <img class="icon" src="img2.png">
    </div>
    <div class="right">
      <button class="d">DASHBOARD</button>
    </div>
  </header>

  <main class="content">
    <h1 class="welcome">Bienvenue dans votre plateforme de soins</h1>
    <div class="actions">
      <button class="btn btn-primary" onclick="location.href='nouvelleConsultation.html'">
        <img src="img3.png" alt="" class="i">
        <span>Nouvelle consultation</span>
      </button>

      <button class="btn btn-secondary" onclick="location.href='ajouterEtudiant.html'">
        <img src="img3.png" alt="" class="i">
        <span>Ajouter un étudiant</span>
      </button>
    </div>
  </main>
</body>
</html>
