<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter un étudiant</title>
<style>
    .form-header {
  display: flex;
  justify-content: space-between; 
  align-items: center;
  padding: 10px 20px;
  background-color: #FFFFFF;
}

.header-item img {
  height: 30px;
  width: auto;
}
 
.center img {
  height: 80px; 
}


.retour {
  display: flex;
  align-items: center;
  gap: 8px;
}

.retour-text {
  color: #539EFF; 
  font-weight: bold;
  text-transform: uppercase;
  font-size: 20px;
}


.form-title {
  text-align: center;
  color: #539EFF;
  font-size: 30px;
  margin: 15px 0;
  font-weight: 700;
}

.form-body {
  display: grid;
  grid-template-columns: 1fr 1fr; 
  gap: 30px;
  width: 80%;
  margin: 0 auto;
}

.form-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 20px;
}

.form-group label {
  font-style: italic;   
  font-weight: medium;   
  margin-bottom: 6px;
  color: #000000;
  font-size: 18px;
}

.form-group input {
  padding: 20px;
  border-radius: 6px;
  border: none; 
  background-color: #F6FAFE; 
  font-size: 15px;
  box-shadow: 0 4px 4px rgba(0,0,0,0.25); 
}

.form-footer {
  display: flex;
  justify-content: center; 
  gap: 20px;               
  margin-left: 500px;
}


.btn {
  padding: 12px 50px;
  border-radius: 25px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}


.btn-finish {
  font-size: 18px;
  background-color: #539EFF;   
  color: #FFFFFF;                
  border: none;                
  box-shadow: 0 4px 4px rgba(0,0,0,0.25); 
}


.btn-cancel {
  font-size: 20px;
  background-color: #FFFFFF;     
  color: #539EFF;              
  border: 2px solid #539EFF;   
  box-shadow: none;            
}
</style>
</head>
<body>

<body>
<div class="form-container">

<header class="form-header">
  <!-- Bloc retour -->
  <div class="header-item retour">
    <img src="retour.png" alt="Retour" style="cursor: pointer;" onclick="history.back()">
    <span class="retour-text">RETOUR</span>
  </div>

  <!-- Icône centrale -->
  <div class="header-item center">
    <img src="etudiants.png" alt="Consultation">
  </div>

  <!-- Menu hamburger -->
  <div class="header-item menu">
    <img src="menu.png" alt="Menu">
  </div>
</header>

<!-- Titre -->
<h1 class="form-title">AJOUT ETUDIANT</h1>

<form method="POST" action="ajouterEtudiant.php">
<main class="form-body" >
  <!-- Colonne gauche -->
  <div class="column left">
    <div class="form-group">
      <label for="motif">Matricule:</label>
      <input type="text" id="motif" name="matricule">
    </div>

    <div class="form-group">
      <label for="diagnostic">Nom:</label>
      <input type="text" id="diagnostic" name="nom">
    </div>

    <div class="form-group">
      <label for="traitement">prénom:</label>
      <input type="text" id="traitement" name="prenom">
    </div>
  </div>


  <!-- Colonne droite -->
  <div class="column right">
    <div class="form-group">
      <label for="etudiant">Filière:</label>
      <input type="text" id="etudiant" name="classe">

    </div>

    <div class="form-group">
      <label for="date">Sexe:</label>
      <input type="text" id="date" name="sexe">
    </div>

    <div class="form-group">
      <label for="medicament">Nom de l'infirmière:</label>
      <input type="text" id="medicament" name="nomInfirmiere">
    </div>
  </div>
</main>

<footer class="form-footer">
  <button type="submit" class="btn btn-finish" name="terminer">Terminer</button>
  <button type="reset" class="btn btn-cancel" name="annuler">Annuler</button>
</footer>
</form>


<script src="script.js"></script>
</body>
</html>
